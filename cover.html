<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点击进入我的Y2K主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: pointer;
}
/* 全屏基础背景 */
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  position: relative;
}

/* 动态流体背景 */
.liquid-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, #1a3a0f, #4a7a3a, #7aa85a, #b8d8a8);
  background-size: 400% 400%;
  animation: liquidFlow 12s ease infinite;
  opacity: 0.9;
}
@keyframes liquidFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 中间点击区域 */
.click-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  transition: all 0.3s;
}
.click-area:hover {
  transform: translate(-50%, -50%) scale(1.05);
}

/* 头像 */
.avatar {
  width: 80px;
  height: 80px;
  background: url('https://picsum.photos/id/64/80/80') center/cover no-repeat;
  border-radius: 50%;
  margin: 0 auto 15px;
  border: 3px solid #fff;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* HELLO文字 */
.hello-text {
  font-size: 32px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  background: rgba(0,0,0,0.6);
  padding: 8px 20px;
  border-radius: 8px;
  letter-spacing: 4px;
}

/* 点击提示 */
.tip {
  margin-top: 20px;
  font-size: 16px;
  color: #fff;
  text-shadow: 0 0 5px rgba(0,0,0,0.8);
  opacity: 0.8;
  animation: blink 1.5s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 0.3; }
}

/* 👇 波纹动画关键帧（必须有，否则波纹不显示） */
@keyframes ripple {
  from { transform: scale(0); opacity: 1; }
  to { transform: scale(2); opacity: 0; }
}
</style>
</head>
<body>
<!-- 动态流体背景 -->
<div class="liquid-bg"></div>

<!-- 点击区域（绑定带事件的点击函数） -->
<div class="click-area" onclick="enterSite(event)">
  <div class="avatar"></div>
  <div class="hello-text">→HELLO←</div>
  <div class="tip">点击进入我的Y2K主页</div>
</div>

<script>
// 👇 完整带波纹的点击函数（必须用这个，否则波纹不生效）
function enterSite(e) {
  // 1. 创建波纹元素
  const ripple = document.createElement('div');
  ripple.style.position = 'absolute';
  ripple.style.width = '200px';
  ripple.style.height = '200px';
  ripple.style.borderRadius = '50%';
  ripple.style.background = 'rgba(255,255,255,0.5)';
  ripple.style.top = e.clientY - 100 + 'px';
  ripple.style.left = e.clientX - 100 + 'px';
  ripple.style.animation = 'ripple 0.6s ease-out';
  ripple.style.pointerEvents = 'none';
  document.body.appendChild(ripple);
  
  // 2. 动画结束后删除波纹元素
  setTimeout(() => ripple.remove(), 600);
  
  // 3. 0.3秒后跳转到主页，保证波纹完整播放
  setTimeout(() => {
    window.location.href = "index.html";
  }, 300);
}
</script>
</body>
</html>
