<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点击进入我的Y2K主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: pointer;
}
html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* 你的背景图 */
.bg {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: url('bg.jpg') center/cover no-repeat;
  z-index: 1;
}

/* 碎玻璃图，盖在背景上面 */
.crack {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: url('crack.png') center/cover no-repeat;
  opacity: 0;
  pointer-events: none;
  z-index: 2;
}

/* 一起碎的动画：同时出现、同时停、同时消失 */
@keyframes screenCrack {
  0%   { opacity: 0; transform: scale(1.1); }
  10%  { opacity: 1; transform: scale(1);  }
  90%  { opacity: 1; transform: scale(1);  }
  100% { opacity: 0; transform: scale(1);  }
}

/* 点击后给它加上动画，就一起碎 */
.crack.show {
  animation: screenCrack 1.2s forwards;
}

.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
}

.avatar {
  width: 80px;
  height: 80px;
  background: url('avatar.png') center/contain no-repeat;
  margin-bottom: 10px;
}

.text {
  color: #fff;
  background: rgba(0,0,0,0.6);
  padding: 8px 20px;
  border-radius: 8px;
}
</style>
</head>

<body onclick="goIndex()">

<div class="bg"></div>
<div class="crack" id="crack"></div>

<div class="center">
  <div class="avatar"></div>
  <div class="text">→ HELLO ←</div>
</div>

<script>
const crack = document.getElementById('crack');

function goIndex() {
  crack.classList.add('show');

  setTimeout(() => {
    location.href = 'index.html';
  }, 1200);
}
</script>

</body>
</html>
