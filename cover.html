<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点击进入我的Y2K主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: pointer;
}
/* 全屏基础背景 */
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  position: relative;
}

/* 👇 背景替换为你的蕾丝魔法棒图 */
.liquid-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  /* 替换为你的背景图，cover铺满全屏 */
  background: url('你的第一张图的在线地址/本地路径') center/cover no-repeat;
  opacity: 0.95;
  /* 轻微流动动画，让背景更有高级感 */
  animation: bgFloat 15s ease-in-out infinite alternate;
}

/* 背景轻微浮动动画，增强质感 */
@keyframes bgFloat {
  0% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.03) rotate(0.5deg); }
  100% { transform: scale(1) rotate(-0.5deg); }
}

/* 中间点击区域 */
.click-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  transition: all 0.3s;
}
.click-area:hover {
  transform: translate(-50%, -50%) scale(1.05);
}

/* 👇 头像替换为你的像素鼠标图，去掉圆角适配像素风格 */
.avatar {
  width: 80px;
  height: 80px;
  background: url('你的第二张图的在线地址/本地路径') center/contain no-repeat;
  margin: 0 auto 15px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* HELLO文字 */
.hello-text {
  font-size: 32px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  background: rgba(0,0,0,0.6);
  padding: 8px 20px;
  border-radius: 8px;
  letter-spacing: 4px;
}

/* 点击提示 */
.tip {
  margin-top: 20px;
  font-size: 16px;
  color: #fff;
  text-shadow: 0 0 5px rgba(0,0,0,0.8);
  opacity: 0.8;
  animation: blink 1.5s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 0.3; }
}

/* 波纹动画关键帧 */
@keyframes ripple {
  from { transform: scale(0); opacity: 1; }
  to { transform: scale(2); opacity: 0; }
}
</style>
</head>
<body>
<!-- 背景 -->
<div class="liquid-bg"></div>

<!-- 点击区域 -->
<div class="click-area" onclick="enterSite(event)">
  <div class="avatar"></div>
  <div class="hello-text">→HELLO←</div>
  <div class="tip">点击进入我的Y2K主页</div>
</div>

<script>
// 粉紫色波纹点击函数
function enterSite(e) {
  const ripple = document.createElement('div');
  ripple.style.position = 'absolute';
  ripple.style.width = '200px';
  ripple.style.height = '200px';
  ripple.style.borderRadius = '50%';
  ripple.style.background = 'rgba(212, 179, 255, 0.6)';
  ripple.style.top = e.clientY - 100 + 'px';
  ripple.style.left = e.clientX - 100 + 'px';
  ripple.style.animation = 'ripple 0.6s ease-out';
  ripple.style.pointerEvents = 'none';
  document.body.appendChild(ripple);
  
  setTimeout(() => ripple.remove(), 600);
  setTimeout(() => {
    window.location.href = "index.html";
  }, 300);
}
</script>
</body>
</html>
