<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Y2K主页</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    cursor: pointer;
  }
  body {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  /* 你的背景图 */
  .bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("bg.jpg") center/cover no-repeat;
  }
  /* 碎玻璃图（平时隐藏） */
  .crack {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("crack.png") center/cover no-repeat;
    opacity: 0;
    pointer-events: none;
  }
  /* 点一下就显示 */
  .crack.show {
    opacity: 1;
  }
  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
  }
  .avatar {
    width: 80px;
    height: 80px;
    background: url("avatar.png") center/contain no-repeat;
    margin-bottom: 10px;
  }
  .text {
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 6px 16px;
    border-radius: 6px;
  }
</style>
</head>

<body onclick="goIndex()">

  <!-- 你的背景图 -->
  <div class="bg"></div>

  <!-- 碎玻璃图 叠在上面 -->
  <div class="crack" id="crack"></div>

  <!-- 中间头像和文字 -->
  <div class="center">
    <div class="avatar"></div>
    <div class="text">点我进入</div>
  </div>

<script>
  const crack = document.getElementById("crack");
  function goIndex() {
    // 点一下 → 碎玻璃闪一下
    crack.classList.add("show");
    // 闪完跳转
    setTimeout(() => {
      location.href = "index.html";
    }, 200);
  }
</script>

</body>
</html>
