<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点击进入我的Y2K主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: pointer;
}
html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  position: relative;
}

/* 背景图：完全撑满 */
.liquid-bg {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: url('bg.jpg') center center / cover no-repeat;
  transform: scale(1.1);
}

/* 碎玻璃：强制全屏、放大到绝对不漏边 */
.crack-overlay {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: url('crack.png') center center / cover no-repeat;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transform: scale(1.2);
}

@keyframes crackAnim {
  0%   { opacity: 0; transform: scale(1.3); }
  15%  { opacity: 1; transform: scale(1.2); }
  85%  { opacity: 1; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1.2); }
}

.click-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
}

.avatar {
  width: 80px;
  height: 80px;
  background: url('avatar.png') center/contain no-repeat;
  margin: 0 auto 15px;
}

.hello-text {
  font-size: 32px;
  color: #fff;
  background: rgba(0,0,0,0.6);
  padding: 8px 20px;
  border-radius: 8px;
}

.tip {
  margin-top: 20px;
  color: #fff;
}
</style>
</head>
<body>

<div class="liquid-bg"></div>
<div class="crack-overlay" id="crackOverlay"></div>

<div class="click-area" onclick="enterSite()">
  <div class="avatar"></div>
  <div class="hello-text">→HELLO←</div>
  <div class="tip">点击进入我的Y2K主页</div>
</div>

<script>
const crack = document.getElementById('crackOverlay');

function enterSite() {
  crack.style.animation = 'none';
  setTimeout(() => {
    crack.style.animation = 'crackAnim 1.2s forwards';
  }, 10);

  setTimeout(() => {
    location.href = "index.html";
  }, 1200);
}
</script>
</body>
</html>
