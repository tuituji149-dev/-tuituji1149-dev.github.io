<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点击进入我的Y2K主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: pointer;
}
html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  position: relative;
}

/* 👇 你的原蕾丝底图，100%保留，占满全屏无白边 */
.liquid-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: url('bg.jpg') center/cover no-repeat;
  opacity: 1;
  z-index: 1;
  transform: scale(1.02);
  animation: bgFloat 15s ease-in-out infinite alternate;
}

@keyframes bgFloat {
  0% { transform: scale(1.02) rotate(0deg); }
  50% { transform: scale(1.05) rotate(0.5deg); }
  100% { transform: scale(1.02) rotate(-0.5deg); }
}

/* 👇 视频破碎特效层：平时隐藏，点击才播放 */
#crack-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transform: scale(1.02);
}

/* 中间点击区域，在底图上方 */
.click-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  transition: all 0.3s;
}
.click-area:hover {
  transform: translate(-50%, -50%) scale(1.05);
}

/* 你的原头像 */
.avatar {
  width: 80px;
  height: 80px;
  background: url('avatar.jpg') center/contain no-repeat;
  margin: 0 auto 15px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* HELLO文字 */
.hello-text {
  font-size: 32px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  background: rgba(0,0,0,0.6);
  padding: 8px 20px;
  border-radius: 8px;
  letter-spacing: 4px;
}

/* 点击提示 */
.tip {
  margin-top: 20px;
  font-size: 16px;
  color: #fff;
  text-shadow: 0 0 5px rgba(0,0,0,0.8);
  opacity: 0.8;
  animation: blink 1.5s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>
<!-- 👇 你的原蕾丝底图，永远显示 -->
<div class="liquid-bg"></div>

<!-- 👇 视频破碎层：平时隐藏，点击播放 -->
<video id="crack-video" muted playsinline>
  <source src="React Bits - Index.webm" type="video/webm">
</video>

<!-- 点击区域 -->
<div class="click-area" onclick="enterSite()">
  <div class="avatar"></div>
  <div class="hello-text">→ HELLO ←</div>
  <div class="tip">点击进入我的Y2K主页</div>
</div>

<script>
const crackVideo = document.getElementById('crack-video');

function enterSite() {
  // 1. 显示视频层，从头播放破碎动画
  crackVideo.style.opacity = 0.8;
  crackVideo.currentTime = 0;
  crackVideo.play();

  // 2. 视频播放完后隐藏，跳转主页
  crackVideo.onended = () => {
    crackVideo.style.opacity = 0;
    window.location.href = "index.html";
  };
}
</script>
</body>
</html>
