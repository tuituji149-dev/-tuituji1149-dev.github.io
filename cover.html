<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点击进入我的Y2K主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: pointer;
}
html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  position: relative;
}

/* 1. 底层：你的原蕾丝底图（永远显示，占满全屏无白边） */
.liquid-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: url('bg.jpg') center/cover no-repeat;
  opacity: 1;
  z-index: 1;
  transform: scale(1.02);
  animation: bgFloat 15s ease-in-out infinite alternate;
}
@keyframes bgFloat {
  0% { transform: scale(1.02) rotate(0deg); }
  50% { transform: scale(1.05) rotate(0.5deg); }
  100% { transform: scale(1.02) rotate(-0.5deg); }
}

/* 2. 中层：透明碎玻璃PNG（放大1.15倍，彻底占满屏无白边） */
.crack-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: url('crack.png') center/cover no-repeat;
  opacity: 0;
  pointer-events: none;
  z-index: 15;
  transform: scale(1.15); /* 核心修改：放大到1.15倍，完全覆盖屏幕边缘 */
}
/* 碎玻璃动画：突然出现+停留1秒+消失 */
@keyframes crackFade {
  0% { opacity: 0; transform: scale(1.2); }
  10% { opacity: 1; transform: scale(1.15); }
  90% { opacity: 1; transform: scale(1.15); }
  100% { opacity: 0; transform: scale(1.15); }
}

/* 3. 顶层：webm破碎视频（同步放大1.15倍，和碎玻璃对齐） */
#crack-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transform: scale(1.15); /* 同步放大，和碎玻璃层完全对齐 */
  mix-blend-mode: overlay;
}

/* 中间点击区域（在所有层最上方） */
.click-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 30;
  transition: all 0.3s;
}
.click-area:hover {
  transform: translate(-50%, -50%) scale(1.05);
}

/* 你的原头像 */
.avatar {
  width: 80px;
  height: 80px;
  background: url('avatar.jpg') center/contain no-repeat;
  margin: 0 auto 15px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

/* HELLO文字（核心修改：替换成你想要的内容） */
.hello-text {
  font-size: 32px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  background: rgba(0,0,0,0.6);
  padding: 8px 20px;
  border-radius: 8px;
  letter-spacing: 4px;
}

/* 点击提示文字（核心修改：替换成你想要的内容） */
.tip {
  margin-top: 20px;
  font-size: 16px;
  color: #fff;
  text-shadow: 0 0 5px rgba(0,0,0,0.8);
  opacity: 0.8;
  animation: blink 1.5s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>
<!-- 底层：蕾丝底图 -->
<div class="liquid-bg"></div>

<!-- 中层：透明碎玻璃PNG -->
<div class="crack-overlay" id="crackOverlay"></div>

<!-- 顶层：webm破碎视频 -->
<video id="crack-video" muted playsinline>
  <source src="React Bits - Index.webm" type="video/webm">
</video>

<!-- 中间点击区域（文字已修改） -->
<div class="click-area" onclick="enterSite()">
  <div class="avatar"></div>
  <!-- 👇 这里改主标题，我示例改成「ENTER」，你可以直接改字 -->
  <div class="hello-text">→ ★ 魔法少女サイト ★←</div>
  <!-- 👇 这里改提示语，我示例改成「点击开启我的Y2K世界」，你可以直接改字 -->
  <div class="tip">点击开启</div>
</div>

<script>
const crackOverlay = document.getElementById('crackOverlay');
const crackVideo = document.getElementById('crack-video');

function enterSite() {
  // 1. 触发透明碎玻璃PNG动画
  crackOverlay.style.animation = 'none';
  setTimeout(() => {
    crackOverlay.style.animation = 'crackFade 1.2s ease-out forwards';
  }, 10);

  // 2. 同步播放webm破碎视频
  crackVideo.style.opacity = 0.8;
  crackVideo.currentTime = 0;
  crackVideo.play();

  // 3. 视频播放完后隐藏，跳转主页
  crackVideo.onended = () => {
    crackVideo.style.opacity = 0;
    window.location.href = "index.html";
  };
}
</script>
</body>
</html>
