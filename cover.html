<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点击进入我的Y2K主页</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: pointer;
}

html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* 视频背景：适配webm格式，全屏无白边 */
#video-bg {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
  transform: scale(1.05); /* 轻微放大彻底消除边缘白边 */
}

/* 碎玻璃覆盖层：100%占满屏 */
#crack {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: url('crack.png') center/cover no-repeat;
  opacity: 0;
  pointer-events: none;
  z-index: 2;
  transform: scale(1.05);
}

/* 点击后碎玻璃动画：突然出现+停留1秒+消失 */
@keyframes crackAnim {
  0%  { opacity: 0; transform: scale(1.1); }
  15% { opacity: 1; transform: scale(1.05); }
  85% { opacity: 1; transform: scale(1.05); }
  100%{ opacity: 0; transform: scale(1.05); }
}

#crack.show {
  animation: crackAnim 1.2s forwards;
}

/* 中间头像+文字 */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
}

.avatar {
  width: 80px;
  height: 80px;
  background: url('avatar.jpg') center/contain no-repeat;
  margin-bottom: 15px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.hello-text {
  font-size: 32px;
  color: #fff;
  background: rgba(0,0,0,0.7);
  padding: 8px 20px;
  border-radius: 8px;
  letter-spacing: 4px;
}

.tip {
  margin-top: 20px;
  font-size: 16px;
  color: #fff;
  text-shadow: 0 0 5px rgba(0,0,0,0.8);
  opacity: 0.8;
  animation: blink 1.5s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 0.3; }
}
</style>
</head>

<body onclick="enterSite()">

<!-- 直接用你的webm视频，注意文件名要完全一致 -->
<video id="video-bg" muted loop autoplay playsinline>
  <source src="React Bits - Index.webm" type="video/webm">
</video>

<div id="crack"></div>

<div class="center">
  <div class="avatar"></div>
  <div class="hello-text">→ HELLO ←</div>
  <div class="tip">点击进入我的Y2K主页</div>
</div>

<script>
const crack = document.getElementById('crack');
const videoBg = document.getElementById('video-bg');

function enterSite() {
  // 1. 触发碎玻璃动画
  crack.classList.add('show');
  
  // 2. 视频同步强化破碎感（可选，让背景跟着震一下）
  videoBg.style.transform = 'scale(1.05)';
  setTimeout(() => {
    videoBg.style.transform = 'scale(1.05)';
  }, 1200);

  // 3. 1.2秒后跳转主页
  setTimeout(() => {
    window.location.href = "index.html";
  }, 1200);
}
</script>

</body>
</html>
