<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untitled | Y2K Sweet</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}
body {
  background: linear-gradient(135deg, #E2D4FF 0%, #F8D4E8 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.main-box {
  width: 100%;
  max-width: 1200px;
  aspect-ratio: 16 / 9;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(8px);
  border: 3px solid #D4B3FF;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(212, 179, 255, 0.25);
}
.top-bar {
  background: linear-gradient(90deg, #F4D8FF 0%, #E4C2FF 100%);
  padding: 12px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 3px solid #C8A2FF;
}
.top-title {
  background: linear-gradient(90deg, #F8D4E8 0%, #F4D8FF 100%);
  border: 3px solid #C8A2FF;
  border-radius: 25px;
  padding: 5px 30px;
  font-size: 24px;
  font-weight: bold;
  color: #8A62C2;
  letter-spacing: 1px;
}
.top-controls {
  display: flex;
  gap: 12px;
}
.control-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 3px solid #C8A2FF;
  background: linear-gradient(135deg, #F4D8FF 0%, #F8D4E8 100%);
}
.nav-bar {
  background: linear-gradient(90deg, #DBC2FF 0%, #E8D1FF 100%);
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 3px solid #B996FF;
}
.nav-left {
  display: flex;
  gap: 15px;
}
.nav-btn {
  background: linear-gradient(135deg, #F4D8FF 0%, #F8D4E8 100%);
  border: 3px solid #C8A2FF;
  border-radius: 20px;
  padding: 6px 22px;
  font-size: 17px;
  font-weight: bold;
  color: #8A62C2;
  cursor: pointer;
  border: none;
}
.nav-right {
  display: flex;
  gap: 10px;
}
.social-icon {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 3px solid #C8A2FF;
  background: #C8A2FF;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
}
.view-tip {
  background: #fff;
  padding: 9px 25px;
  border-bottom: 2px solid #E4D1FF;
}
.view-text {
  display: inline-block;
  background: linear-gradient(90deg, #F4D8FF 0%, #F8D4E8 100%);
  border: 2px solid #D4B3FF;
  border-radius: 15px;
  padding: 4px 18px;
  font-size: 14px;
  font-weight: bold;
  color: #8A62C2;
}
.content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
  padding: 25px;
  height: calc(100% - 210px);
}
.left-card {
  background: #fff;
  border: 3px solid #E4D1FF;
  border-radius: 14px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.card-title {
  font-size: 20px;
  font-weight: bold;
  color: #8A62C2;
  padding-bottom: 6px;
  border-bottom: 2px solid #E4D1FF;
}
.card-text {
  font-size: 15px;
  line-height: 1.6;
  color: #8A62C2;
}
.img-box {
  width: 100%;
  height: 110px;
  background: #F4E8FF;
  border: 2px solid #E4D1FF;
  border-radius: 12px;
}
.right-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.grid-img {
  background: #F4E8FF;
  border: 2px solid #E4D1FF;
  border-radius: 12px;
  aspect-ratio: 1 / 1;
}
.before-box {
  grid-column: 1 / 3;
  background: #fff;
  border: 3px solid #E4D1FF;
  border-radius: 14px;
  padding: 16px;
}
.before-title {
  font-size: 17px;
  font-weight: bold;
  color: #8A62C2;
  margin-bottom: 8px;
}
.before-text {
  font-size: 14px;
  line-height: 1.6;
  color: #8A62C2;
}
.bottom-bar {
  background: linear-gradient(90deg, #DBC2FF 0%, #E8D1FF 100%);
  padding: 10px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 3px solid #B996FF;
}
.bottom-left {
  display: flex;
  gap: 10px;
}
.bottom-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 3px solid #C8A2FF;
  background: linear-gradient(135deg, #F4D8FF 0%, #F8D4E8 100%);
}
.bottom-center {
  font-size: 18px;
  font-weight: bold;
  color: #8A62C2;
  background: linear-gradient(90deg, #F8D4E8 0%, #F4D8FF 100%);
  border: 2px solid #C8A2FF;
  border-radius: 20px;
  padding: 4px 22px;
}
.bottom-right {
  font-size: 13px;
  font-weight: bold;
  color: #8A62C2;
  background: #F4E8FF;
  border: 2px solid #D4B3FF;
  border-radius: 8px;
  padding: 3px 10px;
}
</style>
</head>
<body>

<div class="main-box">
  <div class="top-bar">
    <div class="top-controls">
      <div class="control-btn"></div>
      <div class="control-btn"></div>
      <div class="control-btn"></div>
    </div>
    <div class="top-title">Untitled</div>
    <div></div>
  </div>

  <div class="nav-bar">
    <div class="nav-left">
      <button class="nav-btn">home</button>
      <button class="nav-btn">platforms</button>
      <button class="nav-btn">metrics</button>
    </div>
    <div class="nav-right">
      <div class="social-icon">💬</div>
      <div class="social-icon">🎵</div>
      <div class="social-icon">📷</div>
    </div>
  </div>

  <div class="view-tip">
    <div class="view-text">CURRENTLY VIEWING: ABOUT ME</div>
  </div>

  <div class="content">
    <div class="left-card">
      <div class="card-title">About Me</div>
      <div class="card-text">
        Welcome to my cute Y2K website~<br>
        I love pink & purple retro internet style.
      </div>
      <div class="img-box"></div>
      <div class="img-box"></div>
    </div>

    <div class="right-grid">
      <div class="grid-img"></div>
      <div class="grid-img"></div>
      <div class="grid-img"></div>
      <div class="grid-img"></div>

      <div class="before-box">
        <div class="before-title">Before Following</div>
        <div class="before-text">
          Please read carefully before following.<br>
          This is my personal cute y2k website page.
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-left">
      <div class="bottom-btn"></div>
      <div class="bottom-btn"></div>
      <div class="bottom-btn"></div>
    </div>
    <div class="bottom-center">Untitled</div>
    <div class="bottom-right">by xiu.carrd.co</div>
  </div>
</div>

</body>
</html>
