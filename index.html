<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魔法少女サイト</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  cursor: pointer;
}
html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
  position: relative;
}

/* 底图 */
.liquid-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: url('bg.jpg') center/cover no-repeat;
  opacity: 1;
  z-index: 1;
  transform: scale(1.02);
  animation: bgFloat 15s ease-in-out infinite alternate;
}
@keyframes bgFloat {
  0% { transform: scale(1.02) rotate(0deg); }
  50% { transform: scale(1.05) rotate(0.5deg); }
  100% { transform: scale(1.02) rotate(-0.5deg); }
}

/* 碎玻璃 */
.crack-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: url('crack.png') center/cover no-repeat;
  opacity: 0;
  pointer-events: none;
  z-index: 15;
  transform: scale(1.15);
}
@keyframes crackFade {
  0% { opacity: 0; transform: scale(1.2); }
  10% { opacity: 1; transform: scale(1.15); }
  90% { opacity: 1; transform: scale(1.15); }
  100% { opacity: 0; transform: scale(1.15); }
}

/* 破碎视频 */
#crack-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transform: scale(1.15);
  mix-blend-mode: overlay;
}

/* -------------------- 满屏飘小贴纸样式 -------------------- */
.floating-sticker {
  position: fixed;
  width: 50px;
  z-index: 5;
  pointer-events: none;
  animation: floatAround 20s infinite linear;
}

/* 飘移动画（满屏乱飘、转圈、丝滑） */
@keyframes floatAround {
  0%   { transform: translate(0,0) rotate(0deg); }
  25%  { transform: translate(50px, 30px) rotate(90deg); }
  50%  { transform: translate(-30px, 60px) rotate(180deg); }
  75%  { transform: translate(40px, -20px) rotate(270deg); }
  100% { transform: translate(0,0) rotate(360deg); }
}

/* 每个贴纸速度、方向差异化 */
.float-1 { animation-duration: 18s; animation-delay: 0s; }
.float-2 { animation-duration: 22s; animation-delay: 1s; }
.float-3 { animation-duration: 20s; animation-delay: 2s; }
.float-4 { animation-duration: 24s; animation-delay: 0.5s; }
.float-5 { animation-duration: 19s; animation-delay: 1.5s; }
/* -------------------------------------------------------------------- */

/* 中间文字区域 */
.click-area {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 30;
  transition: all 0.3s;
}
.click-area:hover {
  transform: translate(-50%, -50%) scale(1.05);
}

.avatar {
  width: 80px;
  height: 80px;
  background: url('avatar.jpg') center/contain no-repeat;
  margin: 0 auto 15px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.hello-text {
  font-size: 32px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
  background: rgba(0,0,0,0.6);
  padding: 8px 20px;
  border-radius: 8px;
  letter-spacing: 4px;
}

.tip {
  margin-top: 20px;
  font-size: 16px;
  color: #fff;
  text-shadow: 0 0 5px rgba(0,0,0,0.8);
  opacity: 0.8;
  animation: blink 1.5s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 0.8; }
  50% { opacity: 0.3; }
}

/* -------------------- 弹窗崩坏效果（置顶） -------------------- */
.error-popup {
  position: fixed;
  width: 320px;
  background: #c0c0c0;
  border: 2px solid #fff;
  box-shadow: 3px 3px 0 #000;
  z-index: 9999;
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.2s ease-out;
  font-family: "MS Sans Serif", sans-serif;
  font-size: 12px;
}
.popup-header {
  background: linear-gradient(90deg, #003cbc, #1084f0);
  padding: 3px 5px;
  color: white;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.popup-close {
  width: 14px;
  height: 14px;
  background: #c0c0c0;
  border: 1px solid #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  cursor: default;
}
.popup-content {
  padding: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.popup-icon {
  font-size: 32px;
  flex-shrink: 0;
}
.popup-text {
  line-height: 1.4;
}
.popup-btn {
  display: block;
  margin: 10px auto 15px;
  padding: 4px 20px;
  background: #c0c0c0;
  border: 2px solid #fff;
  box-shadow: inset 1px 1px 0 #fff, 1px 1px 0 #000;
  cursor: default;
}
.popup-show {
  opacity: 1;
  transform: scale(1);
  animation: popupShake 0.3s ease-out;
}
@keyframes popupShake {
  0% { transform: scale(1) translate(0,0); }
  25% { transform: scale(1) translate(-2px, 2px); }
  50% { transform: scale(1) translate(2px, -2px); }
  75% { transform: scale(1) translate(-1px, -1px); }
  100% { transform: scale(1) translate(0,0); }
}
</style>
</head>
<body>

<div class="liquid-bg"></div>

<!-- ===================== 满屏飘的小贴纸（已改PNG文件名） ===================== -->
< img class="floating-sticker float-1" src="弹窗1.png">
< img class="floating-sticker float-2" src="弹窗2.png">
< img class="floating-sticker float-3" src="弹窗1.png">
< img class="floating-sticker float-4" src="弹窗2.png">
< img class="floating-sticker float-5" src="弹窗1.png">
<!-- ========================================================== -->

<div class="crack-overlay" id="crackOverlay"></div>

<video id="crack-video" muted playsinline>
  <source src="React Bits - Index.webm" type="video/webm">
</video>

<div class="click-area" onclick="enterSite()">
  <div class="avatar"></div>
  <div class="hello-text">★ 魔法少女サイト ★</div>
  <div class="tip">💊</div>
</div>

<!-- 弹窗容器 -->
<div id="popup-container"></div>

<script>
const crackOverlay = document.getElementById('crackOverlay');
const crackVideo = document.getElementById('crack-video');
const popupContainer = document.getElementById('popup-container');

// 弹窗数据（可自定义）
const popupTemplates = [
  {title:"Error",icon:"❌",text:"Princess treatment or leave me alone."},
  {title:"Windows 98 Update Wizard",icon:"❌",text:"Windows has detected that your computer is more than 12 months old. Windows 98 requires a newer machine to run properly."},
  {title:"Dialog box",icon:"❓",text:"Sorry, Windows 95 was unable to comply with the \"go to hell\" command you specified."},
  {title:"CD-ROM error",icon:"❌",text:"Error reading 'How to uninstall Windows 95.' Please insert other CD."},
  {title:"Keyboard not plugged",icon:"⚠️",text:"Windows 95 was unable to detect your keyboard. Press F1 to retry or F2 to abort."},
  {title:"Internal Error",icon:"⚠️",text:"Your windows has been running for 10h 37m 23s. Microsoft does not allow a windows system to run longer than that."},
  {title:"Error",icon:"❌",text:"Some sort of error"},
  {title:"Closing Windows 95",icon:"❓",text:"You are about to exit Windows 95. Do you want to play another game?"},
  {title:"Printer Wizard",icon:"🖨️",text:"The new 32bit wizard has obtained a solution to your printing problem: do not print."},
  {title:"Random Error",icon:"❌",text:"Windows 95 has detected a random error. This error occurs every once in a while. Please wait."},
  {title:"Warning",icon:"⚠️",text:"Windows has categorized you as a government employee. Switching to sleep mode."},
  {title:"Virus Alert",icon:"⚠️",text:"You've got the flu"},
  {title:"Windows FAT",icon:"⚠️",text:"Windows 98 has detected too much FAT already in your system. Please stay with FAT16."}
];

// 生成弹窗
function createPopup(template, index) {
  const popup = document.createElement('div');
  popup.className = 'error-popup';
  const left = Math.random() * (window.innerWidth - 320);
  const top = Math.random() * (window.innerHeight - 200);
  popup.style.left = `${left}px`;
  popup.style.top = `${top}px`;
  popup.style.transitionDelay = `${index * 0.05}s`;

  popup.innerHTML = `
    <div class="popup-header">
      <span class="popup-title">${template.title}</span>
      <span class="popup-close">×</span>
    </div>
    <div class="popup-content">
      <span class="popup-icon">${template.icon}</span>
      <span class="popup-text">${template.text}</span>
    </div>
    <button class="popup-btn">OK</button>
  `;
  return popup;
}

// 点击触发
function enterSite() {
  // 碎玻璃动画
  crackOverlay.style.animation = 'none';
  setTimeout(() => {
    crackOverlay.style.animation = 'crackFade 1.2s ease-out forwards';
  }, 10);

  // 破碎视频
  crackVideo.style.opacity = 0.8;
  crackVideo.currentTime = 0;
  crackVideo.play();

  // 批量弹出弹窗
  popupContainer.innerHTML = '';
  popupTemplates.forEach((template, index) => {
    const popup = createPopup(template, index);
    popupContainer.appendChild(popup);
    setTimeout(() => {
      popup.classList.add('popup-show');
    }, index * 50);
  });

  // 1.5秒后跳转
  setTimeout(() => {
    window.location.href = "index.html";
  }, 1500);

  // 视频结束后隐藏
  crackVideo.onended = () => {
    crackVideo.style.opacity = 0;
  };
}
</script>
</body>
</html>
